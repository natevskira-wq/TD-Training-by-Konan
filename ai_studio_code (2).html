<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TD Training Portal</title>
    <style>
        body { font-family: system-ui, Arial; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #0d6efd; margin-bottom: 30px; }
        .btn { display: block; padding: 15px 30px; margin: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 18px; transition: 0.2s; }
        .btn-admin { background: #0d6efd; color: white; }
        .btn-training { background: #198754; color: white; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <h1>TD-Training-by-Konan</h1>
        <a href="admin.html" class="btn btn-admin">Open Scenario Builder (Admin)</a>
        <a href="training.html" class="btn btn-training">Open Agent Simulator (Training)</a>
    </div>
</body>
</html>
